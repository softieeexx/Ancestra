<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ANCESTRA — Ancestral. Ritual-Centric.</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet" />

<style>
/* ── Reset ───────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold:        #c9a84c;
  --gold-dim:    rgba(201,168,76,0.45);
  --gold-glow:   rgba(201,168,76,0.25);
  --green:       #3ddc84;
  --bg:          #0a0a0e;
  --text:        #ffffff;
  --text-muted:  #cccccc;
  --text-faint:  rgba(255,255,255,0.38);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  overflow: hidden;           /* single-viewport design */
}

/* ── Grain texture ───────────────────────────────────── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 10;
  opacity: 0.042;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
  background-size: 180px;
}

/* ── Layout ──────────────────────────────────────────── */
.page {
  position: relative;
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Atmospheric CSS background ─────────────────────── */
.bg {
  position: absolute;
  inset: 0;
  z-index: 0;

  background:
    /* Teal crystal-tower energy — center-right */
    radial-gradient(ellipse 30% 60% at 70% 43%,
      rgba(0, 215, 185, 0.20) 0%,
      rgba(0, 175, 155, 0.09) 38%,
      transparent 66%),

    /* Bright teal secondary glow — far right */
    radial-gradient(ellipse 18% 30% at 91% 50%,
      rgba(0, 200, 175, 0.24) 0%,
      rgba(0, 160, 145, 0.10) 45%,
      transparent 70%),

    /* Warm amber — illuminated mountain faces, upper right */
    radial-gradient(ellipse 62% 50% at 68% 30%,
      rgba(158, 78, 10, 0.56) 0%,
      rgba(112, 52, 8, 0.28) 42%,
      transparent 72%),

    /* Copper/orange peak highlight — top right */
    radial-gradient(ellipse 28% 22% at 74% 14%,
      rgba(200, 96, 12, 0.46) 0%,
      transparent 56%),

    /* Warm fill — right-side mid-ground */
    radial-gradient(ellipse 40% 58% at 88% 52%,
      rgba(88, 42, 7, 0.50) 0%,
      transparent 66%),

    /* Dark purple-blue sky — upper left quadrant */
    radial-gradient(ellipse 55% 42% at 18% 10%,
      rgba(10, 5, 25, 0.74) 0%,
      transparent 62%),

    /* Misty mid-ground fog */
    radial-gradient(ellipse 90% 28% at 55% 56%,
      rgba(16, 9, 3, 0.60) 0%,
      transparent 62%),

    /* Deep dark ground */
    linear-gradient(0deg,
      rgba(4, 3, 1, 0.97) 0%,
      rgba(5, 4, 2, 0.78) 16%,
      transparent 36%),

    /* Base gradient */
    linear-gradient(140deg,
      #020109 0%,
      #07050e 12%,
      #0e0a0a 30%,
      #0d0806 48%,
      #0a0604 65%,
      #070502 82%,
      #060402 100%);
}

/* Mountain spires (SVG inline shapes) */
.bg-spires {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  overflow: hidden;
}

.bg-spires svg {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 80%;
}

/* Left readability gradient */
.bg-left {
  position: absolute;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  background: linear-gradient(105deg,
    rgba(8, 5, 14, 0.97) 0%,
    rgba(8, 5, 14, 0.90) 22%,
    rgba(8, 5, 14, 0.62) 44%,
    rgba(8, 5, 14, 0.18) 64%,
    transparent 82%);
}

/* Top vignette */
.bg-top {
  position: absolute;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  background: linear-gradient(180deg,
    rgba(6, 4, 12, 0.72) 0%,
    transparent 18%);
}

/* ── Navbar ──────────────────────────────────────────── */
.nav {
  position: relative;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 48px;
  flex-shrink: 0;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}

.nav-logo-icon {
  width: 40px;
  height: 40px;
  border-radius: 6px;
  background: #1d7a3e;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  overflow: hidden;
}

.nav-logo-icon svg {
  width: 26px;
  height: 26px;
}

.nav-logo-name {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 1.05rem;
  letter-spacing: 0.28em;
  color: #fff;
  text-transform: uppercase;
}

.nav-docs {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 22px;
  border-radius: 999px;
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  text-decoration: none;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
  font-size: 0.72rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  transition: background 0.2s;
}
.nav-docs:hover { background: rgba(201,168,76,0.07); }

/* ── Hero ─────────────────────────────────────────────── */
.hero {
  position: relative;
  z-index: 20;
  flex: 1;
  display: flex;
  align-items: center;
  padding: 0 64px 32px;
}

.hero-content {
  max-width: 520px;
}

/* Headline */
.hero-title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-weight: 700;
  font-size: clamp(4rem, 11.8vw, 10rem);
  line-height: 0.88;
  letter-spacing: 0.01em;
  color: #fff;
  text-shadow: 0 2px 80px rgba(0,0,0,0.95), 0 0 120px rgba(0,0,0,0.7);
  margin-bottom: 24px;
  user-select: none;
}

/* Subtitle */
.hero-subtitle {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
  font-size: 0.72rem;
  letter-spacing: 0.46em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 20px;
}

/* Body */
.hero-body {
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 1.05rem;
  line-height: 1.65;
  color: var(--text-muted);
  max-width: 375px;
  margin-bottom: 36px;
}

/* CTA button */
.btn-connect {
  display: inline-block;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 0.78rem;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--gold);
  background: rgba(0,0,0,0.22);
  border: 1px solid rgba(201,168,76,0.65);
  padding: 16px 56px;
  cursor: pointer;
  text-decoration: none;
  transition: border-color 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
  min-width: 230px;
  text-align: center;
}
.btn-connect:hover {
  border-color: var(--gold);
  box-shadow: 0 0 24px rgba(201,168,76,0.32), inset 0 0 18px rgba(201,168,76,0.06);
  background: rgba(201,168,76,0.07);
}

/* Status badge */
.hero-status {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 22px;
}

@keyframes pulse-dot {
  0%,100% { box-shadow: 0 0 0 0 rgba(61,220,132,0.55); }
  50%      { box-shadow: 0 0 0 5px rgba(61,220,132,0); }
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
  animation: pulse-dot 2.2s ease-in-out infinite;
}

.status-text {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 500;
  font-size: 0.69rem;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--text-faint);
}

/* ── Feature bar ─────────────────────────────────────── */
.features {
  position: relative;
  z-index: 20;
  flex-shrink: 0;
}

.features-border {
  height: 1px;
  background: linear-gradient(90deg,
    rgba(201,168,76,0.65) 0%,
    rgba(201,168,76,0.38) 48%,
    rgba(201,168,76,0.08) 100%);
}

/* Three short gold stripes above each column */
.features-accents {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  background: rgba(8,6,12,0.94);
  backdrop-filter: blur(18px);
}

.feature-col {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 22px 32px 22px 32px;
  border-right: 1px solid rgba(201,168,76,0.13);
}
.feature-col:last-child { border-right: none; }

.feature-icon { flex-shrink: 0; margin-top: 2px; }

.feature-label {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 0.71rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.88);
  margin-bottom: 5px;
}

.feature-desc {
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 0.71rem;
  line-height: 1.55;
  color: rgba(204,204,204,0.45);
}

/* ── Responsive ──────────────────────────────────────── */
@media (max-width: 768px) {
  .nav { padding: 16px 24px; }
  .hero { padding: 0 24px 24px; }
  .hero-title { font-size: clamp(3.5rem, 16vw, 5.5rem); }
  .features-accents { grid-template-columns: 1fr; }
  .feature-col { border-right: none; border-bottom: 1px solid rgba(201,168,76,0.13); }
  .feature-col:last-child { border-bottom: none; }
  .btn-connect { width: 100%; }
  .bg-left {
    background: linear-gradient(180deg,
      rgba(8,5,14,0.90) 0%,
      rgba(8,5,14,0.78) 40%,
      rgba(8,5,14,0.55) 70%,
      transparent 100%);
  }
}
</style>
</head>
